events {
    worker_connections 1024;
}

http {
    # Rate-limit auth endpoints: 10 requests/minute per IP, burst of 5
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_status 429;

    # Trust Traefik only if Traefik connects to this Nginx container through
    # the Docker network with subnet 172.27.0.0/16.
    set_real_ip_from 172.18.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Preserve original HTTPS scheme from Traefik.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # Correct WebSocket Connection header.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name agent.ululuu.de;
        
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;
        
        client_max_body_size 500m;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # Adminer PostgreSQL management UI
        location = /adminer {
            return 301 /adminer/;
        }

        location /adminer/ {
            proxy_pass http://adminer:8080/;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Rate-limited: login and register (exact match takes priority over /api/)
        location = /api/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend:8000/auth/login;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location = /api/auth/register {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://backend:8000/auth/register;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # NextAuth internal routes go to the Next.js frontend
        location ~ ^/api/auth/(signin|signout|callback|session|csrf|providers|error|_log) {
            proxy_pass http://frontend:3000;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Company logo proxy (Next.js route — must not hit the backend /api/ block below)
        location ~ ^/tickers/[^/]+/logo$ {
            proxy_pass http://frontend:3000;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # All other /api/ requests go to the FastAPI backend (strips /api prefix)
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # WebSocket endpoint without trailing slash
        location /ws {
            proxy_pass http://backend:8000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # WebSocket endpoint with trailing slash
        location /ws/ {
            proxy_pass http://backend:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        location / {
            proxy_pass http://frontend:3000/;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
