events {
    worker_connections 1024;
}

http {
    # Rate-limit auth endpoints: 10 requests/minute per IP, burst of 5
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_status 429;

    server {
        listen 80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate-limited: login and register (exact match takes priority over /api/)
        location = /api/auth/login {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend:8000/auth/login;
        }

        location = /api/auth/register {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://backend:8000/auth/register;
        }

        # NextAuth internal routes go to the Next.js frontend
        location ~ ^/api/auth/(signin|signout|callback|session|csrf|providers|error|_log) {
            proxy_pass http://frontend:3000;
        }

        # All other /api/ requests go to the FastAPI backend (strips /api prefix)
        location /api/ {
            proxy_pass http://backend:8000/;
        }

        location /ws/ {
            proxy_pass http://backend:8000/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location / {
            proxy_pass http://frontend:3000/;
        }
    }
}
