services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentfloor
      POSTGRES_PASSWORD: agentfloor
      POSTGRES_DB: agentfloor
    networks:
      - tcc-network
    volumes:
      - agentfloor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentfloor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tcc-network
    environment:
      DATABASE_URL: postgresql+asyncpg://agentfloor:agentfloor@db:5432/agentfloor
      JWT_SECRET: "${JWT_SECRET}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-noreply@agentfloor.local}"
      FRONTEND_URL: "${NEXTAUTH_URL:-http://localhost}"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - tcc-network
    environment:
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      INTERNAL_API_URL: "http://backend:8000"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    networks:
      - proxy
      - tcc-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # ------------------------------
      # HTTPS ROUTER (always accessible)
      # ------------------------------
      - "traefik.http.routers.agent-secure.entrypoints=websecure"
      - "traefik.http.routers.agent-secure.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.agent-secure.tls=true"
      - "traefik.http.routers.agent-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.agent-secure.service=agent-svc"
      - "traefik.http.routers.agent-secure.middlewares=default-security-headers@file,gzip@file,chain-oauth@file"
      # ------------------------------
      # HTTP ROUTER
      # ------------------------------
      - "traefik.http.routers.agent-http.entrypoints=web"
      - "traefik.http.routers.agent-http.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.agent-http.service=agent-svc"
      # ------------------------------
      # SERVICE DEFINITION
      # ------------------------------
      - "traefik.http.services.agent-svc.loadbalancer.server.port=80"

volumes:
  agentfloor_pgdata:


networks: 
  tcc-network:
    name: tcc-network
  proxy:
    external: true
